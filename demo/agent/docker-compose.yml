services:
  vault:
    image: hashicorp/vault:1.17
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-demo-agent-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  agent:
    build:
      context: ../../
      dockerfile: demo/agent/Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      BROKER_URL: ${BROKER_URL:?Set BROKER_URL to the broker address}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-demo-agent-token}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY}
      ORG_ID: ${ORG_ID:-myorg}
      AGENT_ID: ${AGENT_ID:-myorg::agent}
      DISPLAY_NAME: ${DISPLAY_NAME:-}
      CAPABILITIES: ${CAPABILITIES:-chat}
      AUTO_ACCEPT: ${AUTO_ACCEPT:-true}
      AUTO_RESPOND: ${AUTO_RESPOND:-false}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-}
      SYSTEM_PROMPT_FILE: ${SYSTEM_PROMPT_FILE:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-300}
      TERMINATE_KEYWORD: ${TERMINATE_KEYWORD:-FINE}
      PYTHONUNBUFFERED: "1"
    depends_on:
      vault:
        condition: service_healthy
