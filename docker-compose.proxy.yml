# =============================================================================
# Cullis MCP Proxy — Org-Level Gateway + Built-in PDP
# =============================================================================
#
# Joins the broker's Docker network so the broker can call the PDP webhook
# and the proxy can reach the broker directly.
#
# Usage:
#   docker compose -f docker-compose.proxy.yml up -d
#
# Prerequisites:
#   - Broker running: docker compose up -d (or ./deploy_broker.sh)
#   - The broker's network "agent-trust_default" must exist
#
# On first run, open http://localhost:9100/proxy/login to:
#   1. Enter broker URL: http://broker:8000 (Docker internal)
#   2. Enter your invite token (from broker admin)
#   3. Register your organization (certs auto-generated)
#   4. Create agents
#
# The PDP webhook URL is automatically set to http://mcp-proxy:9100/pdp/policy
# which the broker can reach via the shared Docker network.
# =============================================================================

services:

  mcp-proxy:
    build:
      context: .
      dockerfile: mcp_proxy/Dockerfile
    ports:
      - "${MCP_PROXY_PORT:-9100}:9100"
    environment:
      MCP_PROXY_ENVIRONMENT: ${MCP_PROXY_ENVIRONMENT:-development}
      MCP_PROXY_ADMIN_SECRET: ${MCP_PROXY_ADMIN_SECRET:-change-me-in-production}
      MCP_PROXY_DATABASE_URL: sqlite+aiosqlite:////data/mcp_proxy.db
      # PDP webhook URL — the broker calls this for policy decisions
      # Uses the Docker DNS name so the broker can reach it on the shared network
      MCP_PROXY_PDP_URL: http://mcp-proxy:9100/pdp/policy
      # Vault (optional — uncomment to enable)
      # MCP_PROXY_SECRET_BACKEND: vault
      # MCP_PROXY_VAULT_ADDR: http://vault:8200
      # MCP_PROXY_VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
    volumes:
      - mcp_proxy_data:/data
    networks:
      - broker_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  broker_net:
    external: true
    name: agent-trust_default

volumes:
  mcp_proxy_data:
    driver: local
