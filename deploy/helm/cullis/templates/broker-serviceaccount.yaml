{{- if .Values.broker.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cullis.broker.serviceAccountName" . }}
  labels:
    {{- include "cullis.broker.labels" . | nindent 4 }}
  {{- with .Values.broker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
