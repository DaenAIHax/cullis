# Dev values override — single-node Postgres/Redis/Vault inside the cluster.
# Use on kind, minikube or k3d, NEVER on a real production cluster.
#
#   helm install cullis ./deploy/helm/cullis -f values-dev.yaml

broker:
  environment: development
  logFormat: text
  replicaCount: 1
  prometheusEnabled: true
  # Vault StatefulSet below runs in dev mode on plain HTTP. Without this
  # flag the broker refuses to talk to Vault and /readyz stays at 503.
  # Never set this in production — production uses Vault HTTPS.
  extraEnv:
    - name: VAULT_ALLOW_HTTP
      value: "true"
  pki:
    # Zero-touch CA on evaluation clusters: the chart renders a Job
    # that generates a self-signed broker CA on first install and
    # pushes it into the in-cluster Vault. For production use BYOCA
    # via broker.pki.existingSecret instead (see values.yaml).
    bootstrap:
      enabled: true
      pushToVault: true
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

secrets:
  adminSecret: "dev-admin-secret-change-me"
  vaultToken: "dev-root-token"

postgres:
  internal: true
  storageSize: 2Gi

redis:
  internal: true
  storageSize: 1Gi

vault:
  internal: true
  # Dev / CI reads the broker CA directly from the Secret mounted at
  # /app/certs (created by the pre-install pki-bootstrap Job). Using
  # kmsBackend=local here avoids the deadlock where /readyz waits on
  # Vault to contain the CA, but Vault can only be seeded by the
  # post-install Job that `helm install --wait` will not run until
  # the broker is Ready. Vault still runs (for dashboard secret,
  # invite tokens, etc.) and the post-install Job still pushes the
  # CA there, but the broker's own signing key path uses the
  # filesystem-mounted Secret as the source of truth.
  #
  # Production (values.yaml) keeps kmsBackend=vault because there
  # Vault is typically external and pre-seeded out of band, so the
  # broker can resolve the CA via Vault on first boot.
  kmsBackend: local
  devRootToken: "dev-root-token"

jaeger:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: cullis.127.0.0.1.nip.io
  tls:
    enabled: false
    certManagerIssuer: ""

monitoring:
  prometheusRule:
    enabled: false
  serviceMonitor:
    enabled: false

networkPolicy:
  enabled: false

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false
