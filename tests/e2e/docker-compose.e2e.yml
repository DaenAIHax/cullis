# =============================================================================
# Cullis E2E test stack — completely isolated from any dev `docker compose up`
# =============================================================================
#
# Differences vs the main docker-compose.yml:
#   - All ports remapped to the 18xxx / 19xxx range so a developer's running
#     dev stack does not conflict
#   - Single self-contained network `cullis_e2e_net`
#   - Volumes prefixed `cullis_e2e_*` and removed by `down -v`
#   - Two MCP proxy instances baked in (alpha + beta) for the cross-org flow
#   - KMS_BACKEND=local — broker CA bind-mounted from tests/e2e/.fixtures/
#     (deploy_broker.sh uses Vault and bootstraps the key into it; reproducing
#     that bootstrap inside a transient compose was fragile, so we use the
#     local file backend instead — same code path the unit tests exercise)
#   - Redis in-memory only — no persistence needed
#   - jaeger removed (the e2e test does not assert traces)
#
# Run with:
#   docker compose --project-name cullis-e2e \
#                  -f tests/e2e/docker-compose.e2e.yml \
#                  up -d --build
#
# This file is launched automatically by tests/e2e/conftest.py — you should
# not need to invoke it by hand. The wrapper handles project name, build,
# and teardown.
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cullis
      POSTGRES_PASSWORD: cullis-e2e-pw
      POSTGRES_DB: cullis_e2e
    volumes:
      - cullis_e2e_postgres_data:/var/lib/postgresql/data
    networks:
      - cullis_e2e_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cullis -d cullis_e2e"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    networks:
      - cullis_e2e_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  broker:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "18000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cullis:cullis-e2e-pw@postgres:5432/cullis_e2e
      ADMIN_SECRET: cullis-e2e-admin-secret-do-not-reuse
      # Must match the default AgentManager(trust_domain=...) used by the
      # proxy when it issues agent x509 certs. The broker validates the
      # SPIFFE SAN against this trust domain — mismatch → 401 on login.
      TRUST_DOMAIN: cullis.local
      # No reverse proxy in front of the broker for the e2e test — clients
      # call http://localhost:18000 directly so build_htu derives the URL
      # from the request itself. Leaving BROKER_PUBLIC_URL empty avoids the
      # htu mismatch foot-gun documented in docs/ops-runbook.md.
      BROKER_PUBLIC_URL: ""
      REDIS_URL: redis://redis:6379
      # KMS=local: read broker CA from /app/certs (bind-mounted from
      # tests/e2e/.fixtures/broker_certs by conftest). The mount is rw
      # because the lifespan also writes .admin_secret_hash there.
      KMS_BACKEND: local
      POLICY_BACKEND: webhook
      POLICY_ENFORCEMENT: "true"
      # PDP webhooks live on the same docker network as the broker
      # (proxy-alpha:9100, proxy-beta:9100). Bypass the SSRF block on
      # private/loopback IPs that the broker enforces in production.
      POLICY_WEBHOOK_ALLOW_PRIVATE_IPS: "true"
      OTEL_ENABLED: "false"
      ENVIRONMENT: development
      INJECTION_LLM_JUDGE_ENABLED: "false"
    volumes:
      - ./.fixtures/broker_certs:/app/certs
    networks:
      - cullis_e2e_net
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  # Two proxy instances, one per organization. Both join the same Docker
  # network so the broker can call back into them for the PDP webhook.
  proxy-alpha:
    build:
      context: ../..
      dockerfile: mcp_proxy/Dockerfile
    ports:
      - "19100:9100"
    environment:
      MCP_PROXY_ENVIRONMENT: development
      MCP_PROXY_ADMIN_SECRET: cullis-e2e-proxy-alpha-secret
      MCP_PROXY_DATABASE_URL: sqlite+aiosqlite:////data/mcp_proxy.db
      MCP_PROXY_PDP_URL: http://proxy-alpha:9100/pdp/policy
    volumes:
      - cullis_e2e_proxy_alpha_data:/data
      - ./scripts:/e2e_scripts:ro
    networks:
      - cullis_e2e_net
    depends_on:
      broker: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  proxy-beta:
    build:
      context: ../..
      dockerfile: mcp_proxy/Dockerfile
    ports:
      - "19101:9100"
    environment:
      MCP_PROXY_ENVIRONMENT: development
      MCP_PROXY_ADMIN_SECRET: cullis-e2e-proxy-beta-secret
      MCP_PROXY_DATABASE_URL: sqlite+aiosqlite:////data/mcp_proxy.db
      MCP_PROXY_PDP_URL: http://proxy-beta:9100/pdp/policy
    volumes:
      - cullis_e2e_proxy_beta_data:/data
      - ./scripts:/e2e_scripts:ro
    networks:
      - cullis_e2e_net
    depends_on:
      broker: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

networks:
  cullis_e2e_net:
    name: cullis_e2e_net

volumes:
  cullis_e2e_postgres_data:
  cullis_e2e_proxy_alpha_data:
  cullis_e2e_proxy_beta_data:
