# =============================================================================
# Cullis demo stack — single-host docker compose for live demos
# =============================================================================
#
# What ships in this stack:
#   broker        Cullis trust broker          → http://localhost:8800
#   proxy-alpha   MCP proxy for org "alpha"    → http://localhost:9800
#   proxy-beta    MCP proxy for org "beta"     → http://localhost:9801
#   postgres      broker store (single-node)
#   redis         broker DPoP/JTI cache
#
# This is the demo equivalent of the e2e test stack: same architecture,
# same code paths, but with dedicated port mappings in the 88xx/98xx range
# so neither a developer's running dev stack (`docker compose up`) nor the
# e2e test stack (18xxx/19xxx) collide with the demo.
#
# Driven entirely by deploy_demo.sh — do not run docker compose by hand.
#
# Differences vs deploy_broker.sh + deploy_proxy.sh:
#   - No nginx / TLS — broker is plain HTTP on :8000 (demo only!)
#   - No Vault — KMS_BACKEND=local, broker CA from scripts/demo/.fixtures
#   - Two proxies pre-baked into the same compose so the cross-org flow
#     just works after `up`
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cullis
      POSTGRES_PASSWORD: cullis-demo-pw
      POSTGRES_DB: cullis_demo
    volumes:
      - cullis_demo_postgres_data:/var/lib/postgresql/data
    networks:
      - cullis_demo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cullis -d cullis_demo"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    networks:
      - cullis_demo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  broker:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8800:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cullis:cullis-demo-pw@postgres:5432/cullis_demo
      ADMIN_SECRET: cullis-demo-admin-secret
      # Same trust domain the proxy AgentManager uses by default — must
      # match for SPIFFE SAN validation on agent login.
      TRUST_DOMAIN: cullis.local
      BROKER_PUBLIC_URL: ""
      REDIS_URL: redis://redis:6379
      # KMS=local: broker CA is bind-mounted from scripts/demo/.fixtures
      # (deploy_demo.sh generates it on first run).
      KMS_BACKEND: local
      POLICY_BACKEND: webhook
      POLICY_ENFORCEMENT: "true"
      # PDP webhooks live on the same private docker network as the broker,
      # so the production SSRF block on RFC1918 addresses needs an opt-in
      # bypass. Demo only — never enable this in production.
      POLICY_WEBHOOK_ALLOW_PRIVATE_IPS: "true"
      OTEL_ENABLED: "false"
      ENVIRONMENT: development
      INJECTION_LLM_JUDGE_ENABLED: "false"
    volumes:
      - ./.fixtures/broker_certs:/app/certs
    networks:
      - cullis_demo_net
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  proxy-alpha:
    build:
      context: ../..
      dockerfile: mcp_proxy/Dockerfile
    ports:
      - "9800:9100"
    environment:
      MCP_PROXY_ENVIRONMENT: development
      MCP_PROXY_ADMIN_SECRET: cullis-demo-proxy-alpha
      MCP_PROXY_DATABASE_URL: sqlite+aiosqlite:////data/mcp_proxy.db
      MCP_PROXY_PDP_URL: http://proxy-alpha:9100/pdp/policy
    volumes:
      - cullis_demo_proxy_alpha_data:/data
      # Mounts the same in-container provisioning helper the e2e test
      # uses — no duplication, single source of truth for "how to bring
      # an org online without touching the dashboard HTML".
      - ../../tests/e2e/scripts:/demo_scripts:ro
    networks:
      - cullis_demo_net
    depends_on:
      broker: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  proxy-beta:
    build:
      context: ../..
      dockerfile: mcp_proxy/Dockerfile
    ports:
      - "9801:9100"
    environment:
      MCP_PROXY_ENVIRONMENT: development
      MCP_PROXY_ADMIN_SECRET: cullis-demo-proxy-beta
      MCP_PROXY_DATABASE_URL: sqlite+aiosqlite:////data/mcp_proxy.db
      MCP_PROXY_PDP_URL: http://proxy-beta:9100/pdp/policy
    volumes:
      - cullis_demo_proxy_beta_data:/data
      - ../../tests/e2e/scripts:/demo_scripts:ro
    networks:
      - cullis_demo_net
    depends_on:
      broker: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

networks:
  cullis_demo_net:
    name: cullis_demo_net

volumes:
  cullis_demo_postgres_data:
  cullis_demo_proxy_alpha_data:
  cullis_demo_proxy_beta_data:
