# Cullis — Prometheus Alert Rules
#
# Drop this file into your Prometheus instance under rule_files. The metric
# names follow the OpenTelemetry → Prometheus naming convention: dots in
# instrument names become underscores, and counter metrics are suffixed
# with "_total".
#
#   Instrument                              Prometheus name
#   atn.auth.success                  -->   atn_auth_success_total
#   atn.cert_pinning.mismatch         -->   atn_cert_pinning_mismatch_total
#   atn.audit_chain.verify_failed     -->   atn_audit_chain_verify_failed_total
#   atn.dpop.jti_replay_attempt       -->   atn_dpop_jti_replay_attempt_total
#   atn.revoked_token.use_attempt     -->   atn_revoked_token_use_attempt_total
#   atn.kms.seal_check_failed         -->   atn_kms_seal_check_failed_total
#   atn.policy.dual_org_mismatch      -->   atn_policy_dual_org_mismatch_total
#   atn.session.created               -->   atn_session_created_total
#   atn.session.denied                -->   atn_session_denied_total
#   atn.policy.allow                  -->   atn_policy_allow_total
#   atn.policy.deny                   -->   atn_policy_deny_total
#   atn.ratelimit.reject              -->   atn_ratelimit_reject_total
#   atn.pdp_webhook.latency           -->   atn_pdp_webhook_latency_milliseconds
#   atn.message.queued                -->   atn_message_queued_total
#   atn.message.expired               -->   atn_message_expired_total
#   atn.ws.pong_timeout               -->   atn_ws_pong_timeout_total
#   atn.ws.queue_drained              -->   atn_ws_queue_drained_total
#
# Validate locally with:
#   promtool check rules cullis-alerts.yml

groups:
  # ──────────────────────────────────────────────────────────────────────
  # Critical security signals — every non-zero is a potential incident.
  # Route these to PagerDuty / Opsgenie / SIEM with severity=critical.
  # ──────────────────────────────────────────────────────────────────────
  - name: cullis_security_critical
    interval: 30s
    rules:
      - alert: CullisCertPinningMismatch
        expr: increase(atn_cert_pinning_mismatch_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          component: cullis-broker
        annotations:
          summary: "Cert thumbprint pinning mismatch on {{ $labels.org_id }}"
          description: |
            One or more agents presented a certificate that does not match
            the pinned thumbprint. Either an agent rotated its certificate
            without using the rotate-cert endpoint, or an attacker is
            presenting a forged certificate signed by a rogue CA.
            Investigate the audit log for `auth.token_request` events
            with reason `cert_thumbprint_mismatch`.

      - alert: CullisAuditChainBroken
        expr: increase(atn_audit_chain_verify_failed_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          component: cullis-broker
        annotations:
          summary: "Audit log hash chain verification failed"
          description: |
            The append-only audit log hash chain is broken. This indicates
            either tampering with the database or a corruption event.
            Stop accepting new requests and investigate before any further
            audit-relevant operations.

      - alert: CullisRevokedTokenReuseAttempt
        expr: increase(atn_revoked_token_use_attempt_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          component: cullis-broker
        annotations:
          summary: "Attempt to use a revoked credential"
          description: |
            A revoked certificate or token was presented in an auth request.
            This often indicates a compromised key still being used by an
            attacker. Cross-check the revocation reason and the source IP.

      - alert: CullisDpopReplaySpike
        expr: increase(atn_dpop_jti_replay_attempt_total[5m]) > 5
        for: 0m
        labels:
          severity: critical
          component: cullis-broker
        annotations:
          summary: "DPoP proof replay attempts spiking"
          description: |
            More than 5 DPoP proof replay attempts in 5 minutes. Either
            an SDK has a bug regenerating JTI, or an attacker is replaying
            captured proofs. Verify clock skew and SDK versions in use.

  # ──────────────────────────────────────────────────────────────────────
  # Operational warnings — trends that need attention but not paging.
  # Route to Slack / email with severity=warning.
  # ──────────────────────────────────────────────────────────────────────
  - name: cullis_operational
    interval: 30s
    rules:
      - alert: CullisHighAuthFailureRate
        expr: |
          (
            sum(rate(atn_auth_deny_total[5m]))
            /
            (sum(rate(atn_auth_success_total[5m])) + sum(rate(atn_auth_deny_total[5m])))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "Auth failure rate above 5% over 5 minutes"
          description: |
            More than 5% of token requests are being denied. Common causes:
            misconfigured agent certificate, expired binding, broken DPoP
            implementation, or brute-force enumeration. Inspect the deny
            reasons in `atn_auth_deny_total` by label.

      - alert: CullisPolicyDualOrgMismatch
        expr: increase(atn_policy_dual_org_mismatch_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "Federated policy mismatch detected"
          description: |
            One organization's PDP allowed a session while the other denied
            it. The two policies are out of sync. Coordinate with the
            counterpart org to align capability declarations.

      - alert: CullisPdpWebhookLatencyHigh
        expr: |
          histogram_quantile(0.99,
            sum(rate(atn_pdp_webhook_latency_milliseconds_bucket[5m])) by (le)
          ) > 4000
        for: 5m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "PDP webhook p99 latency above 4s"
          description: |
            The PDP webhook p99 latency is approaching the 5-second timeout
            after which the broker fails closed. New sessions will start
            being denied for "pdp_timeout". Check the PDP webhook target
            and the network path between the broker and the PDP.

      - alert: CullisRateLimitFlood
        expr: sum(rate(atn_ratelimit_reject_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "Rate limiter rejecting more than 10 req/s"
          description: |
            Rate limiter rejecting more than 10 requests/second sustained.
            Either a misbehaving agent in tight loop or an active flood
            against an exposed endpoint. Inspect by `bucket` label.

      - alert: CullisKmsSealCheckFailed
        expr: increase(atn_kms_seal_check_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "KMS/Vault seal check failed"
          description: |
            Vault is sealed or unreachable. The broker can keep serving
            existing sessions from cached keys, but cannot rotate or write
            new secrets. Unseal Vault before any maintenance windows.

      - alert: CullisMessageExpirySpike
        expr: |
          sum(increase(atn_message_expired_total[10m]))
          /
          clamp_min(sum(increase(atn_message_queued_total[10m])), 1)
          > 0.1
        for: 10m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "More than 10% of queued messages expired over 10 minutes"
          description: |
            A non-trivial fraction of offline-queued messages are hitting TTL
            before the recipient comes back. Either recipients are dying and
            not reconnecting, or the TTL values requested by senders are too
            aggressive for the current agent availability. Inspect
            `atn_message_expired_total` by org_id and correlate with WS
            connection counts.

      - alert: CullisWsPongTimeoutSpike
        expr: sum(rate(atn_ws_pong_timeout_total[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "WebSocket pong timeouts elevated"
          description: |
            The broker is dropping WS connections because clients are not
            answering pings. Sustained rate indicates network path
            degradation between clients and broker, or clients frozen in
            userland. Cross-check with session closures by reason.

      - alert: CullisSessionDeniedSpike
        expr: |
          sum(rate(atn_session_denied_total[5m])) > 5
          and on()
          sum(rate(atn_session_created_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
          component: cullis-broker
        annotations:
          summary: "Session creation denial rate elevated"
          description: |
            More than 5 session denials per second sustained. Most often
            caused by a misconfigured policy that just shipped. Check
            `atn_session_denied_total` by `reason` label.

  # ──────────────────────────────────────────────────────────────────────
  # Liveness — broker process / dependencies.
  # ──────────────────────────────────────────────────────────────────────
  - name: cullis_liveness
    interval: 15s
    rules:
      - alert: CullisBrokerDown
        expr: up{job="cullis-broker"} == 0
        for: 1m
        labels:
          severity: critical
          component: cullis-broker
        annotations:
          summary: "Cullis broker scrape target down"
          description: "Prometheus has not been able to scrape the Cullis broker for 1 minute."

      - alert: CullisBrokerNotReady
        expr: probe_success{job="cullis-readyz"} == 0
        for: 2m
        labels:
          severity: critical
          component: cullis-broker
        annotations:
          summary: "Cullis /readyz returning non-200"
          description: |
            The broker readiness probe is failing. One of database, Redis,
            or KMS is unreachable. Check the response body of /readyz to
            identify which dependency is broken.
