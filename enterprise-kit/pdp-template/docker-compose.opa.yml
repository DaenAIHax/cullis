# OPA sidecar for the PDP template.
#
# Run alongside the PDP server or as a standalone policy engine.
# The Cullis broker can query OPA directly (POLICY_BACKEND=opa, OPA_URL=http://opa:8181)
# or the PDP server can forward to OPA (--opa-url http://opa:8181).
#
# Usage:
#   docker compose -f docker-compose.opa.yml up
#
# To customize policies:
#   1. Edit ../opa/policy/atn/session.rego
#   2. Edit ../opa/config.json (allowed_orgs, blocked_agents, capabilities)
#   3. Restart the opa container

services:
  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
      - "/data/config.json"
    volumes:
      - ../opa/policy:/policies:ro
      - ../opa/config.json:/data/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  pdp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - OPA_URL=http://opa:8181
    command: ["python", "pdp_server.py", "--port", "9000", "--opa-url", "http://opa:8181"]
    depends_on:
      opa:
        condition: service_healthy
