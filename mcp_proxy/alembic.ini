# MCP Proxy — Alembic configuration.
#
# Mirrors alembic.ini at the repo root (which manages the broker schema),
# but points at mcp_proxy/alembic/ and uses PROXY_DB_URL as the DSN override.
#
# Invocation:
#   alembic -c mcp_proxy/alembic.ini upgrade head
#   PROXY_DB_URL=postgresql+asyncpg://... alembic -c mcp_proxy/alembic.ini upgrade head
#
# At proxy startup, mcp_proxy.main runs the equivalent programmatically via
# alembic.command.upgrade(...) — this .ini is for CLI / CI / local use.

[alembic]
script_location = %(here)s/alembic
path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///./mcp_proxy.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
